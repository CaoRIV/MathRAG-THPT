    <article>
      <h1>Nguyên hàm và tích phân cơ bản</h1>
      <h2>Công thức nguyên hàm</h2>
      <p>Với số thực n khác -1, ta có $\int x^n dx = \frac{x^{n+1}}{n+1} + C$.</p>
      <p>Nguyên hàm của hàm mũ là $\int e^x dx = e^x + C$.</p>
      <h2>Ví dụ</h2>
      <p>Tính $\int 3x^2 dx$. Áp dụng công thức lũy thừa, kết quả là $x^3 + C$.</p>
    </article>
  </body>
